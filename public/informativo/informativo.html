<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Informativo | Soft Line Sistemas</title>
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevent scrollbars in the desktop widget */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }

    /* Compact Widget Layout */
    .widget-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      position: relative;
    }

    /* Top Accent Line */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #1e53b8 0%, #3b82f6 100%);
    }

    /* Header (Logo) */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .logo-img {
      height: 28px;
      max-width: 130px;
      object-fit: contain;
    }

    .badge {
      font-size: 9px;
      font-weight: 700;
      background-color: #eff6ff;
      color: #1e53b8;
      padding: 3px 8px;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Content Area */
    .content-body {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 12px;
    }

    .title {
      font-size: 15px;
      font-weight: 800;
      color: #1e53b8;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .text {
      font-size: 12px;
      color: #475569;
      line-height: 1.4;
    }

    /* Call To Action Buttons / Contact */
    .footer {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-support {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #1e53b8 0%, #1d4ed8 100%);
      color: #ffffff;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 6px -1px rgba(30, 83, 184, 0.15);
      transition: background 0.2s ease;
    }

    .btn-support:hover {
      background: #1d4ed8;
    }

    .site-link {
      display: block;
      text-align: center;
      font-size: 10px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
    }

    .site-link:hover {
      color: #1e53b8;
      text-decoration: underline;
    }

    /* Responsive adjustments for extremely small viewports */
    @media (max-height: 220px) {
      .logo-img { height: 22px; }
      .title { font-size: 13px; }
      .text { font-size: 11px; }
      .btn-support { padding: 6px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- Top Accent Bar -->
  <div class="top-bar"></div>

  <!-- Widget Container -->
  <div class="widget-container">
    
    <!-- Header -->
    <div class="header">
      <img src="/image/Logo Softline.png" alt="Soft Line" class="logo-img" />
      <span class="badge">Informativo</span>
    </div>

    <!-- Content -->
    <div class="content-body">
      <h1 class="title">ERP Sempre Atualizado</h1>
      <p class="text">Mantenha seu sistema na versão mais recente para ter acesso às novas regras fiscais, emissão de NFS-e simplificada e melhorias de segurança.</p>
    </div>

    <!-- Footer Action -->
    <div class="footer">
      <a href="https://wa.me/5571993703911" target="_blank" class="btn-support">
        Falar com Suporte WhatsApp
      </a>
      <a href="https://www.softlineinfo.com.br" target="_blank" class="site-link">
        www.softlineinfo.com.br
      </a>
    </div>

  </div>

</body>
</html>
